<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Penche</title>
  <style>
    :root{
      --bg:#0e0e1b; --panel:#1a1a2e; --panel-2:#15152a; --border:#2a2a4a;
      --text:#e7e9f3; --muted:#8b8fa3; --faint:#5b5f73;
      --accent:#a78bfa; --accent-strong:#7c3aed;
      --green:#4ade80; --amber:#fbbf24; --red:#f87171; --blue:#60a5fa;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{width:320px;font-family:system-ui,-apple-system,"Segoe UI",sans-serif;
      background:radial-gradient(420px 200px at 90% -10%,#241a4d 0%,transparent 60%),var(--bg);
      color:var(--text);font-size:13px}
    .header{display:flex;align-items:center;gap:9px;padding:13px 15px;border-bottom:1px solid var(--border)}
    .mark{width:26px;height:26px;border-radius:7px;display:grid;place-items:center;font-size:14px;
      background:linear-gradient(135deg,#8b5cf6,#6d28d9);box-shadow:0 2px 8px rgba(124,58,237,.5)}
    .header h1{font-size:15px;font-weight:700;letter-spacing:.3px}
    .pill{margin-left:auto;display:inline-flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);
      background:var(--panel);border:1px solid var(--border);border-radius:20px;padding:4px 10px}
    .pill .dot{width:7px;height:7px;border-radius:50%;background:var(--faint)}
    .pill.online .dot{background:var(--green);box-shadow:0 0 6px var(--green)}
    .pill.offline .dot{background:var(--red)}
    .pill.online{color:var(--green)} .pill.offline{color:var(--red)}

    .card{margin:12px 15px 0;background:var(--panel-2);border:1px solid var(--border);border-radius:10px;padding:12px 13px}
    .label{font-size:10px;color:var(--faint);text-transform:uppercase;letter-spacing:.6px;margin-bottom:5px}
    .domain{font-size:14px;font-weight:650;color:#f1f5f9;word-break:break-all}
    .profile{display:flex;align-items:center;gap:7px;margin-top:9px;font-size:12px}
    .profile .tag{padding:2px 9px;border-radius:11px;font-weight:600;font-size:11px}
    .profile.ok .tag{background:#14532d;color:var(--green)}
    .profile.warn .tag{background:#3a2e14;color:var(--amber)}
    .addlink{margin-left:auto;color:var(--accent);text-decoration:none;font-size:11.5px;font-weight:600}
    .addlink:hover{text-decoration:underline}

    .stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:10px 15px 0}
    .stat{background:var(--panel-2);border:1px solid var(--border);border-radius:9px;padding:10px 12px}
    .stat .v{font-size:16px;font-weight:700;margin-top:2px}
    .stat .v.muted{color:var(--muted);font-size:12.5px;font-weight:600}

    .btn{display:flex;align-items:center;justify-content:center;gap:8px;width:calc(100% - 30px);margin:13px 15px 0;
      padding:11px;background:var(--accent-strong);color:#fff;border:none;border-radius:9px;font-size:13.5px;
      font-weight:650;cursor:pointer;transition:background .15s,transform .1s}
    .btn:hover{background:#6d28d9}
    .btn:active{transform:translateY(1px)}
    .btn:disabled{background:#2a2a3e;color:var(--faint);cursor:not-allowed}
    #status-msg{padding:8px 15px 0;font-size:12px;min-height:16px;text-align:center}

    .actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:12px 15px 0}
    .act{display:flex;align-items:center;justify-content:center;gap:7px;padding:9px;background:var(--panel);
      border:1px solid var(--border);color:var(--muted);border-radius:9px;font-size:12.5px;font-weight:600;
      cursor:pointer;text-decoration:none;transition:all .15s}
    .act:hover{color:var(--text);border-color:var(--accent-strong)}
    .act svg{flex-shrink:0}

    .footer{display:flex;align-items:center;justify-content:space-between;padding:12px 15px;margin-top:12px;
      border-top:1px solid var(--border);color:var(--faint);font-size:11px}
    .kbd{border:1px solid var(--border);border-radius:5px;padding:1px 7px;color:var(--accent);background:var(--panel);font-size:11px}
  </style>
</head>
<body>
  <div class="header">
    <div class="mark">⚡</div>
    <h1>Penche</h1>
    <span class="pill" id="router-pill"><span class="dot"></span><span id="router-text">Bağlanıyor…</span></span>
  </div>

  <div class="card">
    <div class="label">Aktif Site</div>
    <div class="domain" id="domain-val">—</div>
    <div class="profile" id="profile-row">
      <span class="label" style="margin:0">Profil</span>
      <span class="tag" id="profile-tag">—</span>
      <a href="#" class="addlink" id="add-profile-link" hidden>+ Profil ekle</a>
    </div>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="label">Bekleyen (Outbox)</div>
      <div class="v" id="outbox-val">0</div>
    </div>
    <div class="stat">
      <div class="label">Son Yakalama</div>
      <div class="v muted" id="last-capture-val">—</div>
    </div>
  </div>

  <button class="btn" id="capture-btn">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3Z"/><circle cx="12" cy="13" r="3"/></svg>
    Şimdi Yakala
  </button>
  <div id="status-msg"></div>

  <div class="actions">
    <a href="#" class="act" id="gallery-link">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.1-3.1a2 2 0 0 0-2.8 0L6 21"/></svg>
      Galeri
    </a>
    <a href="#" class="act" id="options-link">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1Z"/></svg>
      Ayarlar
    </a>
  </div>

  <div class="footer">
    <span>Kısayol <span class="kbd" id="shortcut-hint">Ctrl+Shift+X</span></span>
    <span id="version">v1.1</span>
  </div>

  <script src="./popup.ts" type="module"></script>
</body>
</html>
