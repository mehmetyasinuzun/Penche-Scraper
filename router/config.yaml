# Penche Router — Konfigürasyon
#
# Bu dosyayı doğrudan düzenleyebilirsin.
# Hassas bilgileri (token gibi) env variable olarak da geçebilirsin:
#
#   Windows CMD:
#     set PENCHE_AUTH_SECRET=buraya-yaz
#     set PENCHE_TAIGA_TOKEN=buraya-yaz
#
#   Windows PowerShell:
#     $env:PENCHE_AUTH_SECRET="buraya-yaz"
#     $env:PENCHE_TAIGA_TOKEN="buraya-yaz"
#
#   Linux / macOS / Git Bash:
#     export PENCHE_AUTH_SECRET="buraya-yaz"
#     export PENCHE_TAIGA_TOKEN="buraya-yaz"

server:
  host: "127.0.0.1"
  port: 8787

auth:
  # Eklenti ile router arasında ortak şifre.
  # İstediğin bir şey olabilir — ama boş bırakma.
  shared_secret: "CHANGE_ME"

storage:
  dsn: "penche.db"

worker:
  poll_interval_ms: 2000
  max_retries: 5
  base_backoff_ms: 1000
  max_backoff_ms: 60000
  concurrent_jobs: 3

routes:
  default: "taiga"
  # Belirli domainleri farklı adaptöre yönlendirmek istersen:
  # domain_map:
  #   "exploit.in": "taiga"
  #   "baska-forum.onion": "webhook"

adapters:
  taiga:
    enabled: true
    base_url: "https://tree.taiga.io"
    # project_slug: Taiga URL'indeki proje adı.
    # Örnek: tree.taiga.io/project/enesm-monitoring-team/kanban
    #   → project_slug: "enesm-monitoring-team"
    project_slug: ""
    # auth_token: Taiga API token'ı.
    # env variable ile vermek daha güvenli: PENCHE_TAIGA_TOKEN
    auth_token: ""

  webhook:
    enabled: false
    # Herhangi bir HTTP endpoint — Discord, Slack, n8n, özel sunucu...
    url: ""
    method: "POST"
    timeout_ms: 10000
    # Ek header gerektiren servisler için:
    # headers:
    #   Authorization: "Bearer TOKEN"

log:
  level: "info"
  format: "json"
