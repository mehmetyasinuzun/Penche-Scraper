# Penche Router — Konfigürasyon
#
# Env variable override'ları (hassas bilgiler için):
#
#   Windows CMD:
#     set PENCHE_AUTH_SECRET=buraya-yaz
#     set PENCHE_TAIGA_TOKEN=buraya-yaz
#
#   PowerShell:
#     $env:PENCHE_AUTH_SECRET="buraya-yaz"
#     $env:PENCHE_TAIGA_TOKEN="buraya-yaz"

server:
  host: "127.0.0.1"
  port: 8787

auth:
  # Eklenti ile router arasında ortak şifre. Herhangi bir şey olabilir.
  shared_secret: "CHANGE_ME"

storage:
  dsn: "penche.db"

worker:
  poll_interval_ms: 2000
  max_retries: 5
  base_backoff_ms: 1000
  max_backoff_ms: 60000
  concurrent_jobs: 3

routes:
  # Hangi adapter varsayılan olarak kullanılsın.
  # Seçenekler: "local", "taiga", "webhook"
  default: "local"

adapters:

  # LOCAL: Capture'ları diske kaydeder + http://127.0.0.1:8787/ui adresinde görüntüler.
  # Taiga veya webhook kurmadan hemen çalışmaya başlamak için bu yeterli.
  local:
    enabled: true
    output_dir: "output"   # router klasörüne göre. Tam yol da verilebilir: "C:/Penche/output"

  # TAIGA: Direkt Taiga Kanban'a kart açar.
  # Token nasıl alınır: README'deki "Taiga Token Alma" bölümüne bak.
  taiga:
    enabled: false
    base_url: "https://tree.taiga.io"
    project_slug: ""    # URL'deki kısım: tree.taiga.io/project/BURASI/kanban
    auth_token: ""      # ya da env: PENCHE_TAIGA_TOKEN

  # WEBHOOK: Herhangi bir HTTP endpoint'e POST atar (Discord, Slack, n8n…)
  webhook:
    enabled: false
    url: ""
    method: "POST"
    timeout_ms: 10000

log:
  level: "info"
  format: "json"
